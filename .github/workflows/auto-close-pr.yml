name: Auto Close Unvouched PR

on:
  pull_request_target:
    types: [opened]

permissions:
  contents: read
  pull-requests: write

jobs:
  close:
    runs-on: ubuntu-latest

    steps:
      - name: Skip check for members, collaborators, and trusted bots
        run: |
          if [[ "$ACTOR" == "dependabot[bot]" ]]; then
            echo "User is a trusted bot — skipping vouch check"
            echo "skip=true" >> $GITHUB_OUTPUT
          elif [[ "$ASSOCIATION" == "OWNER" || "$ASSOCIATION" == "MEMBER" || "$ASSOCIATION" == "COLLABORATOR" ]]; then
            echo "User is $ASSOCIATION — skipping vouch check"
            echo "skip=true" >> $GITHUB_OUTPUT
          fi
        id: free-pass
        env:
          ASSOCIATION: ${{ github.event.pull_request.author_association }}
          ACTOR: ${{ github.actor }}

      - name: Checkout repo
        uses: actions/checkout@v4
        if: steps.free-pass.outputs.skip != 'true'

      - name: Check if user is vouched
        if: steps.free-pass.outputs.skip != 'true'
        id: check
        run: |
          if grep -q "@$ACTOR" .github/VOUCHED.md; then
            echo "vouched=true" >> $GITHUB_OUTPUT
          else
            echo "vouched=false" >> $GITHUB_OUTPUT
          fi
        env:
          ACTOR: ${{ github.actor }}

      - name: Comment and close PR
        if: steps.free-pass.outputs.skip != 'true' && steps.check.outputs.vouched == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const author = context.payload.pull_request.user.login;

            const message =
              "Thanks for the contribution, @" + author + "!\n\n" +
              "This repository uses a vouch system.\n\n" +
              "PRs from non-vouched users are automatically closed.\n\n" +
              "To contribute:\n" +
              "1. Open a Discussion under Vouch Request\n" +
              "2. Wait for approval\n" +
              "3. Then open your PR\n\n" +
              "Thank you!";

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: message
            });

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              state: "closed"
            });