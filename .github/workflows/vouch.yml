name: Vouch User

on:
  issue_comment:
    types: [created]
  discussion_comment:
    types: [created]

permissions:
  contents: read

jobs:
  vouch:
    runs-on: ubuntu-latest

    steps:
      - name: Check if commenter is authorized
        run: |
          ASSOCIATION="$COMMENT_AUTHOR_ASSOCIATION"
          if [[ "$ASSOCIATION" != "OWNER" && "$ASSOCIATION" != "MEMBER" && "$ASSOCIATION" != "COLLABORATOR" ]]; then
            echo "User is not authorized to vouch (association: $ASSOCIATION)"
            exit 1
          fi
        env:
          COMMENT_AUTHOR_ASSOCIATION: ${{ github.event.comment.author_association }}

      - name: Check if comment contains !vouch
        run: |
          if [[ "$COMMENT_BODY" != *"!vouch"* ]]; then
            exit 1
          fi
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}

      - name: Get author (issue or discussion)
        id: author
        run: |
          if [ "$EVENT_NAME" = "discussion_comment" ]; then
            AUTHOR="$DISCUSSION_AUTHOR"
          else
            AUTHOR="$ISSUE_AUTHOR"
          fi

          echo "author=$AUTHOR"
          echo "author=$AUTHOR" >> $GITHUB_OUTPUT
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISCUSSION_AUTHOR: ${{ github.event.discussion.user.login }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}

      - name: Print manual action required
        run: |
          echo "### Vouch detected" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Commenter **$COMMENTER** approved a vouch for **@$AUTHOR**." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Manual action required:** add the following line to \`.github/VOUCHED.md\` via a direct commit or PR:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "- @$AUTHOR" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        env:
          AUTHOR: ${{ steps.author.outputs.author }}
          COMMENTER: ${{ github.event.comment.user.login }}